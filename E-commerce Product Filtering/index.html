<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopCart</title>
    <link rel="stylesheet" href="./style.css">

</head>

<body>

    <!--Heading-->
    <h1>Products</h1>


    <!--Loading-->
    <div class="loading" id="loading">
        Loading....
    </div>


    <div class="container">
        <!--Side Bar-->
        <div class="side-bar" id="side-bar">
            <div class="category-filter">
                <h3 class="sideBarHead">Category: </h3>
                <label>
                    <input type="checkbox" value="men's clothing"> men's clothing <br>
                    <input type="checkbox" value="jewelery"> jewelery <br>
                    <input type="checkbox" value="electronics"> electronics <br>
                    <input type="checkbox" value="women's clothing"> women's clothing <br>
                </label>
            </div>

            <div class="price-filter">

                <h3 class="sideBarHead">Price: </h3>

                <input type="number" placeholder="max-price" id="max-price">
                <input type="number" placeholder="min-price" id="min-price">
                <button class="priceFilter" id="price-filter-btn">></button>
            </div>
        </div>


        <!--Products-->
        
        <div class="products" id="products" >
           
        </div>
      


    </div>




    <script src="./script.js"></script>
</body>
</html>
